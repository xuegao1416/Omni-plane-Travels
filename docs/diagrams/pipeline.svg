<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="varGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>

    <symbol id="icon-user" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M20 21a8 8 0 1 0-16 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-brain" viewBox="0 0 24 24">
      <path d="M12 2a4 4 0 0 1 4 4 3 3 0 0 1 2 5.24V16a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4v-4.76A3 3 0 0 1 8 6a4 4 0 0 1 4-4z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M12 2v20M8 6h8M8 16h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-pen" viewBox="0 0 24 24">
      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-file-text" viewBox="0 0 24 24">
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M14 2v4a2 2 0 0 0 2 2h4M10 13H8M16 17H8M16 13h-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-database" viewBox="0 0 24 24">
      <ellipse cx="12" cy="5" rx="9" ry="3" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="m21 21-4.3-4.3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-list" viewBox="0 0 24 24">
      <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-layers" viewBox="0 0 24 24">
      <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-arrow-up-down" viewBox="0 0 24 24">
      <path d="m21 16-4 4-4-4M17 20V4M3 8l4-4 4 4M7 4v16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-check-circle" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="m9 12 2 2 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-code" viewBox="0 0 24 24">
      <path d="m16 18 6-6-6-6M8 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-save" viewBox="0 0 24 24">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M17 21v-8H7v8M7 3v5h8" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <symbol id="icon-sparkles" viewBox="0 0 24 24">
      <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 3v4M19 17v4M3 5h4M17 19h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect width="800" height="1050" fill="#0f172a" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" fill="white" font-size="24" font-weight="bold">11 阶段 AI 管线</text>

  <!-- 用户输入  -->
  <rect x="270" y="65" width="260" height="48" rx="24" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <use href="#icon-user" x="308" y="79" width="20" height="20" color="#a5b4fc"/>
  <text x="400" y="95" text-anchor="middle" fill="#a5b4fc" font-size="14">用户输入</text>

  <line x1="400" y1="113" x2="400" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 1: Main Task  -->
  <rect x="140" y="150" width="520" height="90" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="140" y="150" width="520" height="34" rx="8" fill="url(#headerGrad)"/>
  <text x="170" y="173" fill="white" font-size="13" font-weight="bold">Stage 1 · main</text>
  <text x="655" y="173" fill="white" font-size="12" text-anchor="end">正文生成</text>
  <use href="#icon-sparkles" x="588" y="161" width="14" height="14" color="white"/>
  <text x="170" y="202" fill="#94a3b8" font-size="12">组装系统提示词 → 流式请求 AI → 解析响应</text>
  <text x="170" y="224" fill="#64748b" font-size="11">提取 contenttext · OPTION · thinking · summary</text>

  <line x1="400" y1="240" x2="400" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 记忆管线标题  -->
  <rect x="240" y="275" width="320" height="34" rx="17" fill="url(#memoryGrad)"/>
  <use href="#icon-brain" x="272" y="284" width="16" height="16" color="white"/>
  <text x="390" y="297" text-anchor="middle" fill="white" font-size="13" font-weight="bold">记忆管线 (9 阶段)</text>

  <line x1="400" y1="309" x2="400" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 记忆阶段 2-10 -->
  <g transform="translate(140, 345)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 2</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">write</text>
    <use href="#icon-pen" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">记忆写入</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">提取场景/线索/关系/事件/实体 → 合并到运行时</text>
  </g>

  <g transform="translate(140, 410)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 3</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">summary</text>
    <use href="#icon-file-text" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">摘要保存</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">AI 生成玩家/角色/物品的结构化摘要</text>
  </g>

  <g transform="translate(140, 475)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 4</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">vector</text>
    <use href="#icon-database" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">向量提取</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">提取长期事实 → 规范化为向量记忆条目</text>
  </g>

  <g transform="translate(140, 540)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 5</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">query</text>
    <use href="#icon-search" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">查询改写</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">分析用户输入 → 提取检索关键词 + 语义查询</text>
  </g>

  <g transform="translate(140, 605)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 6</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">plan</text>
    <use href="#icon-list" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">检索规划</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">AI 从全部记忆中选择本轮需要注入的相关记忆</text>
  </g>

  <g transform="translate(140, 670)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 7</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">multi</text>
    <use href="#icon-layers" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">多轮补充</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">补充检索首轮遗漏的记忆</text>
  </g>

  <g transform="translate(140, 735)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 8</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">rerank</text>
    <use href="#icon-arrow-up-down" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">精排</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">AI 对选中记忆进行相关性打分重排序</text>
  </g>

  <g transform="translate(140, 800)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 9</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">finalize</text>
    <use href="#icon-check-circle" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">检索定稿</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">标题匹配 + 关键词匹配 → 去重 → 最终计划</text>
  </g>

  <g transform="translate(140, 865)">
    <rect width="520" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect width="90" height="60" rx="6" fill="#f59e0b" opacity="0.2"/>
    <text x="45" y="24" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Stage 10</text>
    <text x="45" y="44" text-anchor="middle" fill="#fbbf24" font-size="10">compile</text>
    <use href="#icon-code" x="105" y="22" width="14" height="14" color="#fde68a"/>
    <text x="128" y="26" fill="#fde68a" font-size="12" font-weight="600">上下文编译</text>
    <text x="128" y="48" fill="#94a3b8" font-size="11">组装场景/玩家/角色/物品记忆 → 注入系统提示词</text>
  </g>

  <line x1="400" y1="925" x2="400" y2="955" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

 
  <rect x="140" y="960" width="520" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="140" y="960" width="520" height="34" rx="8" fill="url(#varGrad)"/>
  <text x="170" y="983" fill="white" font-size="13" font-weight="bold">Stage 11 · variable</text>
  <text x="655" y="983" fill="white" font-size="12" text-anchor="end">变量提取</text>
  <use href="#icon-settings" x="588" y="971" width="14" height="14" color="white"/>
  <text x="170" y="1015" fill="#94a3b8" font-size="12">独立 API 调用 → 解析 UpdateVariable → 应用补丁 → 校验 → 快照</text>

  <use href="#icon-save" x="310" y="1055" width="14" height="14" color="#64748b"/>
  <text x="400" y="1068" text-anchor="middle" fill="#64748b" font-size="11">自动存档 + 快照回滚点</text>
</svg>
