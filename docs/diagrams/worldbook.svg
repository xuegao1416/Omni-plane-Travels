<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="injectGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>

    <!-- Lucide 风格图标组件 -->
    <symbol id="icon-book-open" viewBox="0 0 24 24">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <symbol id="icon-message-square" viewBox="0 0 24 24">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="m21 21-4.3-4.3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-refresh-cw" viewBox="0 0 24 24">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M21 3v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 16H3v5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-check-circle" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="m9 12 2 2 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-map-pin" viewBox="0 0 24 24">
      <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <symbol id="icon-arrow-right" viewBox="0 0 24 24">
      <path d="M5 12h14M12 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-arrow-left" viewBox="0 0 24 24">
      <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-git-branch" viewBox="0 0 24 24">
      <line x1="6" y1="3" x2="6" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="18" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M18 9a9 9 0 0 1-9 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- 背景 -->
  <rect width="700" height="520" fill="#0f172a" rx="12"/>

  <!-- 标题 -->
  <use href="#icon-book-open" x="240" y="18" width="24" height="24" color="white"/>
  <text x="370" y="40" text-anchor="middle" fill="white" font-size="22" font-weight="bold">SillyTavern 兼容世界书扫描</text>

  <!-- 输入 -->
  <rect x="200" y="60" width="300" height="48" rx="24" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <use href="#icon-message-square" x="225" y="74" width="20" height="20" color="#c4b5fd"/>
  <text x="350" y="90" text-anchor="middle" fill="#c4b5fd" font-size="14">聊天历史 + 用户输入</text>

  <!-- 箭头 -->
  <line x1="350" y1="108" x2="350" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 扫描引擎 -->
  <rect x="150" y="145" width="400" height="95" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="150" y="145" width="400" height="35" rx="10" fill="url(#scanGrad)"/>
  <use href="#icon-search" x="175" y="153" width="18" height="18" color="white"/>
  <text x="350" y="168" text-anchor="middle" fill="white" font-size="14" font-weight="bold">scanWorldInfo</text>
  <text x="350" y="200" text-anchor="middle" fill="#c4b5fd" font-size="13">多轮递归扫描（最多 10 轮）</text>
  <text x="350" y="222" text-anchor="middle" fill="#94a3b8" font-size="11">新激活条目的内容加入下一轮扫描缓冲</text>

  <!-- 循环箭头 -->
  <path d="M 555 190 C 610 190, 610 170, 555 170" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <use href="#icon-refresh-cw" x="612" y="175" width="14" height="14" color="#f59e0b"/>
  <text x="635" y="187" fill="#f59e0b" font-size="10">递归</text>

  <!-- 箭头 -->
  <line x1="350" y1="240" x2="350" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 激活的条目 -->
  <rect x="200" y="275" width="300" height="55" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <use href="#icon-check-circle" x="225" y="292" width="20" height="20" color="#6ee7b7"/>
  <text x="350" y="308" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="600">激活的条目集合</text>

  <!-- 箭头 -->
  <line x1="350" y1="330" x2="350" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 注入位置标题 -->
  <rect x="180" y="365" width="340" height="32" rx="16" fill="url(#injectGrad)"/>
  <use href="#icon-map-pin" x="210" y="373" width="16" height="16" color="white"/>
  <text x="350" y="386" text-anchor="middle" fill="white" font-size="13" font-weight="bold">按位置分组注入</text>

  <!-- 三个注入位置 -->
  <g transform="translate(60, 420)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <use href="#icon-arrow-right" x="20" y="20" width="14" height="14" color="#93c5fd"/>
    <text x="85" y="30" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">beforeChar</text>
    <text x="85" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">系统提示词之前</text>
  </g>

  <g transform="translate(265, 420)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <use href="#icon-arrow-left" x="20" y="20" width="14" height="14" color="#93c5fd"/>
    <text x="85" y="30" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">afterChar</text>
    <text x="85" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">系统提示词之后</text>
  </g>

  <g transform="translate(470, 420)">
    <rect width="170" height="65" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <use href="#icon-git-branch" x="20" y="20" width="14" height="14" color="#93c5fd"/>
    <text x="85" y="30" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">atDepth(N)</text>
    <text x="85" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">消息历史中第 N 条前</text>
  </g>

  <!-- 连接线 -->
  <line x1="280" y1="397" x2="145" y2="420" stroke="#475569" stroke-width="1.5"/>
  <line x1="350" y1="397" x2="350" y2="420" stroke="#475569" stroke-width="1.5"/>
  <line x1="420" y1="397" x2="555" y2="420" stroke="#475569" stroke-width="1.5"/>

  <!-- 底部说明 -->
  <use href="#icon-settings" x="155" y="503" width="14" height="14" color="#64748b"/>
  <text x="350" y="515" text-anchor="middle" fill="#64748b" font-size="11">支持正则关键词 / 大小写敏感 / 全词匹配 / 分组互斥 / 概率触发</text>
</svg>
